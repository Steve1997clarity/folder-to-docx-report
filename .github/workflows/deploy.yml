name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 100.50.38.143
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            cd /home/ec2-user/folder-to-docx-report
            git pull origin main
            pip3.12 install -r requirements.txt
            sudo systemctl restart docx-report.service
            sleep 3
            sudo systemctl is-active docx-report.service
